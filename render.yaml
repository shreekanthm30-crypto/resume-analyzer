services:
  - type: web
    name: resume-analyzer
    runtime: python3
    buildCommand: "pip install -r requirements.txt && DJANGO_SETTINGS_MODULE=config.settings python manage.py collectstatic --noinput"
    startCommand: "DJANGO_SETTINGS_MODULE=config.settings python manage.py runserver 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # You'll set this manually
    plan: free
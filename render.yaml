services:
  - type: web
    name: resume-analyzer
    runtime: python3
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput --settings=config.settings"
    startCommand: "python manage.py runserver 0.0.0.0:$PORT --settings=config.settings"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # You'll set this manually
    plan: free